name: Bitcoin (BTCUSDT) Bot

on:
  schedule:
    # IST Kill Zones → UTC (same windows as Gold):
    #   KZ-A  05:30–07:30 IST = 00:00–02:00 UTC
    #   KZ-L  13:30–15:30 IST = 08:00–10:00 UTC
    #   KZ-NY 18:30–20:30 IST = 13:00–15:00 UTC
    # BTC trades 24/7
    - cron: "*/15 0-2 * * *"     # Asian Kill Zone (every day)
    - cron: "*/15 8-10 * * *"    # London Kill Zone (every day)
    - cron: "*/15 13-15 * * *"   # New York Kill Zone (every day)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTC scan
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BTC_SCORE:        "65"
        run: python run_btc.py

      - name: Commit updated BTC signals log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add btc_signals_log.json
          git diff --staged --quiet || git commit -m "chore: update btc signals log [skip ci]"
          git push || true
