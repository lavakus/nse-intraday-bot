name: Bitcoin (BTCUSDT) Bot

on:
  schedule:
    # Every 30 min, 24/7 — BTC never sleeps
    - cron: "0,30 * * * *"
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Force scan outside kill zone"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Run BTC scan
        id: scan
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BTC_SCORE:        "60"
          FORCE_SCAN:       ${{ github.event.inputs.force_scan || '0' }}
        run: python run_btc.py

      - name: Report scan outcome
        if: steps.scan.outcome == 'failure'
        run: echo "::warning::BTC scan step failed — check logs above. Committing any partial output."

      - name: Commit updated BTC signals log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          [ -f btc_signals_log.json ] && git add btc_signals_log.json || true
          git diff --staged --quiet || git commit -m "chore: update BTC signals log [skip ci]"
          git push || true
