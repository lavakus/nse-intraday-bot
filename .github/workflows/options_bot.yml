name: Options Scanner (Nifty / BankNifty / Sensex)

on:
  schedule:
    # Every 15 min during full NSE market hours (Mon–Fri)
    # 9:15 AM – 3:20 PM IST  =  3:45 AM – 9:50 AM UTC
    - cron: "45 3 * * 1-5"
    - cron: "0,15,30,45 4 * * 1-5"
    - cron: "0,15,30,45 5 * * 1-5"
    - cron: "0,15,30,45 6 * * 1-5"
    - cron: "0,15,30,45 7 * * 1-5"
    - cron: "0,15,30,45 8 * * 1-5"
    - cron: "0,15,30,45 9 * * 1-5"
  workflow_dispatch:
    inputs:
      update_only:
        description: "Update status only (no scan)"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  options-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Run Options Scanner
        id: scan
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPDATE_ONLY:      ${{ github.event.inputs.update_only || '0' }}
        run: python run_options.py

      - name: Report scan outcome
        if: steps.scan.outcome == 'failure'
        run: echo "::warning::Options scan step failed — check logs above. Committing any partial output."

      - name: Commit options log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          [ -f options_log.json ] && git add options_log.json || true
          git diff --staged --quiet || git commit -m "chore: update options log [skip ci]"
          git push || true
