name: Gold (XAUUSD) Bot

on:
  schedule:
    # IST Kill Zones → UTC:
    #   KZ-A  05:30–07:30 IST = 00:00–02:00 UTC
    #   KZ-L  13:30–15:30 IST = 08:00–10:00 UTC
    #   KZ-NY 18:30–20:30 IST = 13:00–15:00 UTC
    # Gold trades Mon–Fri (forex hours)
    - cron: "0,15,30,45 0-1 * * 1-5"    # Asian KZ
    - cron: "0,15,30,45 8-9 * * 1-5"    # London KZ
    - cron: "0,15,30,45 13-14 * * 1-5"  # New York KZ
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Force scan outside kill zone"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Run Gold scan
        id: scan
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOLD_SCORE:       "65"
          FORCE_SCAN:       ${{ github.event.inputs.force_scan || '0' }}
        run: python run_gold.py

      - name: Report scan outcome
        if: steps.scan.outcome == 'failure'
        run: echo "::warning::Gold scan step failed — check logs above. Committing any partial output."

      - name: Commit updated Gold signals log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          [ -f gold_signals_log.json ] && git add gold_signals_log.json || true
          git diff --staged --quiet || git commit -m "chore: update gold signals log [skip ci]"
          git push || true
