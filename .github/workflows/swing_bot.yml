name: Swing Stock Tracker (Daily Mon–Fri)

on:
  schedule:
    # Every Mon–Fri at 15:35 IST = 10:05 UTC (just after NSE close)
    # Monday  → full scan for new weekly picks + EOD update
    # Tue–Fri → live price update + EOD Telegram update only
    - cron: "5 10 * * 1-5"
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Force full scan (FORCE_SWING=1)"
        required: false
        default: "0"
      update_only:
        description: "Update statuses only, no new scan"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  swing-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Run Swing Scanner / Updater
        id: swing
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SWING:      ${{ github.event.inputs.force_scan || '0' }}
          UPDATE_ONLY:      ${{ github.event.inputs.update_only || '0' }}
        run: python run_swing.py

      - name: Report swing outcome
        if: steps.swing.outcome == 'failure'
        run: echo "::warning::Swing scanner step failed — check logs above. Committing any partial output."

      - name: Commit updated swing log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          [ -f swing_log.json ] && git add swing_log.json || true
          git diff --staged --quiet || git commit -m "chore: update swing log $(date +'%Y-%m-%d') [skip ci]"
          git push || true
