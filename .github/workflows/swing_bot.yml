name: Swing Stock Scanner (Weekly — Monday)

on:
  schedule:
    # Every Monday at 09:15 IST = 03:45 UTC
    - cron: "45 3 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force scan even if already done this week"
        required: false
        default: "0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  swing-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Swing Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SWING:      ${{ github.event.inputs.force || '0' }}
        run: python run_swing.py

      - name: Commit swing log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add swing_log.json
          git diff --staged --quiet || git commit -m "chore: weekly swing picks [skip ci]"
          git push || true
